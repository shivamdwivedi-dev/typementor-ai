        <h1 style="font-size:2rem;font-weight:900;margin-bottom:0.5rem;">TypeMentor AI — Free AI Typing Coach for Developers</h1>
        <p style="margin-bottom:1.5rem;">TypeMentor AI is a free, AI-powered typing coach built for developers, students, and writers. Practice touch typing, identify your personal weak keys with live AI diagnostics, track your WPM and accuracy, and level up through 50+ structured lessons.</p>

        <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:0.75rem;">Key Features</h2>
        <ul style="margin-bottom:1.5rem;padding-left:1.25rem;">
          <li>AI-powered weak-key detection and targeted recovery drills</li>
          <li>Live WPM, raw WPM, accuracy, and consistency tracking</li>
          <li>Typing Academy: 50+ structured lessons from home-row basics to advanced coding syntax</li>
          <li>Coding syntax practice: Python, JavaScript, Java, SQL</li>
          <li>Endurance Arena with focus score biometric metrics</li>
          <li>XP system, daily streaks, and shareable achievement certificates</li>
          <li>Privacy-safe posture camera mode (fully local, no upload)</li>
          <li>Guest mode — no account required to start practicing</li>
        </ul>

        <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:0.75rem;">Why Learn Touch Typing?</h2>
        <p style="margin-bottom:1rem;">Touch typing — typing without looking at the keyboard — is one of the highest-leverage productivity skills. The average developer types 40 WPM; at 80 WPM, the same work takes half the time. TypeMentor uses AI to identify exactly which keys slow you down and builds custom drills around them.</p>

        <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:0.75rem;">Frequently Asked Questions</h2>
        <dl style="margin-bottom:1.5rem;">
          <dt style="font-weight:700;">Is TypeMentor AI free?</dt>
          <dd style="margin-bottom:0.75rem;">Yes. TypeMentor AI is completely free. Guest Mode requires no registration.</dd>
          <dt style="font-weight:700;">What programming languages are supported?</dt>
          <dd style="margin-bottom:0.75rem;">Python, JavaScript, Java, and SQL syntax practice templates are included.</dd>
          <dt style="font-weight:700;">Is my camera data private?</dt>
